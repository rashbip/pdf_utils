name: pdf_utils
description: "A comprehensive Flutter plugin for PDF manipulation, including professional invoice generation, image-to-PDF conversion, and PDF-to-image extraction."
version: 3.2.1
homepage: https://github.com/rashbip/pdf_utils

environment:
  sdk: ^3.11.1
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  pdf: ^3.12.0
  pdfx: ^2.9.2
  path: ^1.9.1
  path_provider: ^2.1.5
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.rashbip.pdf_utils
        pluginClass: PdfUtilsPlugin
      ios:
        pluginClass: PdfUtilsPlugin
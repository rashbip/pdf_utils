name: pdf_utils
description: "A comprehensive Flutter plugin for PDF manipulation, including professional invoice generation, image-to-PDF conversion, and PDF-to-image extraction."
version: 1.0.1
homepage: https://github.com/rashbip/pdf_utils # TODO: Replace with actual repository URL

environment:
  sdk: ^3.11.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  pdf: ^3.11.1
  pdfx: ^2.6.0
  path: ^1.9.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  pdf_worker: ^1.0.6
  flutter_pdf_text: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

